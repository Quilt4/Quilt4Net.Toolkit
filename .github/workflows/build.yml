name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  MAJOR_MINOR: '0.10'

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore 2>&1 | tee build.log

      - name: Check warnings (ratchet)
        # Warning ratchet: committed baseline is enforced as a ceiling.
        # - current > ceil(baseline * 1.05) -> fail
        # - current < baseline -> emit notice so the developer can update
        #   .github/warning-baseline.txt in their PR to lock in the improvement
        # - otherwise -> pass
        run: |
          BASELINE_FILE=.github/warning-baseline.txt
          CURRENT=$(grep -c " warning " build.log || true)
          BASELINE=$(cat "$BASELINE_FILE" 2>/dev/null || echo "$CURRENT")
          LIMIT=$(( (BASELINE * 105 + 99) / 100 ))  # ceil(baseline * 1.05)

          echo "Baseline: $BASELINE"
          echo "Current:  $CURRENT"
          echo "Limit:    $LIMIT (baseline + 5%)"

          if [ "$CURRENT" -gt "$LIMIT" ]; then
            echo "::error::Warnings increased: $CURRENT > $LIMIT (baseline $BASELINE + 5%)"
            exit 1
          fi

          if [ "$CURRENT" -lt "$BASELINE" ]; then
            echo "::notice::Warnings dropped from $BASELINE to $CURRENT. Consider updating .github/warning-baseline.txt to lock in the improvement."
          fi

      - name: Test with coverage
        run: dotnet test -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Compute version
        id: version
        run: |
          LATEST_TAG=$(git tag -l "${MAJOR_MINOR}.*" --sort=-v:refname \
            | grep -E "^${MAJOR_MINOR}\.[0-9]+$" \
            | head -1)

          if [ -z "$LATEST_TAG" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST_TAG" | sed "s/${MAJOR_MINOR}\.\([0-9]*\)/\1/")
            PATCH=$((PATCH + 1))
          fi

          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION (previous: $LATEST_TAG)"

      - name: Compute pre-release version
        id: preversion
        if: github.ref != 'refs/heads/master'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRE_BASE="${VERSION}-pre"

          LATEST_PRE=$(git tag -l "${PRE_BASE}.*" --sort=-v:refname | head -1)

          if [ -z "$LATEST_PRE" ]; then
            COUNTER=1
          else
            COUNTER=$(echo "$LATEST_PRE" | sed "s/.*-pre\.\([0-9]*\)/\1/")
            COUNTER=$((COUNTER + 1))
          fi

          PRE_VERSION="${PRE_BASE}.${COUNTER}"
          echo "version=$PRE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed pre-release version: $PRE_VERSION"

      - name: Pack
        run: |
          VERSION="${{ github.ref == 'refs/heads/master' && steps.version.outputs.version || steps.preversion.outputs.version }}"
          for proj in \
            Quilt4Net.Toolkit/Quilt4Net.Toolkit.csproj \
            Quilt4Net.Toolkit.Api/Quilt4Net.Toolkit.Api.csproj \
            Quilt4Net.Toolkit.Health/Quilt4Net.Toolkit.Health.csproj \
            Quilt4Net.Toolkit.Blazor/Quilt4Net.Toolkit.Blazor.csproj \
            Quilt4Net.Toolkit.Mcp/Quilt4Net.Toolkit.Mcp.csproj; do
            echo "Packing $proj ($VERSION)..."
            dotnet pack "$proj" -c Release --no-build -o ./artifacts -p:PackageVersion="$VERSION"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build for CodeQL
        run: dotnet build -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  release:
    needs: [build, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/

      - name: Compute version
        id: version
        run: |
          LATEST_TAG=$(git tag -l "${MAJOR_MINOR}.*" --sort=-v:refname \
            | grep -E "^${MAJOR_MINOR}\.[0-9]+$" \
            | head -1)

          if [ -z "$LATEST_TAG" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST_TAG" | sed "s/${MAJOR_MINOR}\.\([0-9]*\)/\1/")
            PATCH=$((PATCH + 1))
          fi

          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet
        run: |
          for pkg in ./artifacts/*.nupkg; do
            echo "Pushing $pkg..."
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate || true
          done

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FLAG=""
          if [ -n "${{ steps.version.outputs.previous_tag }}" ]; then
            NOTES_FLAG="--notes-start-tag ${{ steps.version.outputs.previous_tag }}"
          fi
          gh release create "${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            $NOTES_FLAG \
            ./artifacts/*.nupkg

      - name: Comment released version on merged PR
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'Merge pull request #\K\d+' | head -1)
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "Released as **v${{ steps.version.outputs.version }}** — https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"
          else
            echo "No PR number found in commit message — skipping PR comment."
          fi

  # Docs site (DocFX → GitHub Pages). Gated on `release` succeeding so the published docs always
  # reflect a real released version of the packages, never an in-progress master commit. The path-
  # filter from the old docs.yml is replaced by the release gate: docs publish on each release,
  # not on every doc/source touch.
  docs:
    needs: release
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    # Per-job permissions so the rest of the pipeline doesn't carry pages/id-token grants. Same
    # set the old docs.yml workflow used.
    permissions:
      contents: read
      pages: write
      id-token: write

    # Pages concurrency stays scoped to the docs+deploy pair — won't block build/security/release.
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore
        run: dotnet restore

      - name: Build site
        run: docfx docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  docs-deploy:
    needs: docs
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  prerelease:
    needs: [build, security]
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master' && github.event_name == 'pull_request'
    environment: prerelease

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/

      - name: Compute pre-release version
        id: version
        run: |
          LATEST_TAG=$(git tag -l "${MAJOR_MINOR}.*" --sort=-v:refname \
            | grep -E "^${MAJOR_MINOR}\.[0-9]+$" \
            | head -1)

          if [ -z "$LATEST_TAG" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST_TAG" | sed "s/${MAJOR_MINOR}\.\([0-9]*\)/\1/")
            PATCH=$((PATCH + 1))
          fi

          PRE_BASE="${MAJOR_MINOR}.${PATCH}-pre"
          LATEST_PRE=$(git tag -l "${PRE_BASE}.*" --sort=-v:refname | head -1)

          if [ -z "$LATEST_PRE" ]; then
            COUNTER=1
          else
            COUNTER=$(echo "$LATEST_PRE" | sed "s/.*-pre\.\([0-9]*\)/\1/")
            COUNTER=$((COUNTER + 1))
          fi

          VERSION="${PRE_BASE}.${COUNTER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet
        run: |
          for pkg in ./artifacts/*.nupkg; do
            echo "Pushing $pkg..."
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate || true
          done

      - name: Create GitHub Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }} (pre-release)" \
            --notes "Pre-release from \`${{ github.head_ref }}\` branch." \
            --prerelease \
            ./artifacts/*.nupkg
